name: Check Build

on:
  pull_request:
    branches:
      - main
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  changes:
    # Detect whether a PR touches anything other than docs. Output is consumed by
    # the build job to skip the artifact build (and the artifacts comment) when
    # only documentation changed. /build comments bypass this check entirely.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/build'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # Allowlist: build only when files that actually feed into the
          # electron-vite + electron-builder output change. Anything outside
          # this list (docs, .github/, LICENSE, scripts unrelated to the bundle)
          # is treated as a no-op and skips the artifact build.
          filters: |
            code:
              - 'src/**'
              - 'resources/**'
              - 'package.json'
              - 'package-lock.json'
              - 'electron.vite.config.*'
              - 'tsconfig*.json'

  build:
    needs: changes
    if: >
      (github.event_name == 'pull_request' && needs.changes.outputs.code == 'true') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/build'))
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux zip
          - os: windows-latest
            platform: win
            args: --win zip
          - os: macos-latest
            platform: mac
            args: --mac zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Get PR branch
        if: github.event_name == 'issue_comment'
        id: get-pr
        shell: bash
        run: echo "ref=refs/pull/${{ github.event.issue.number }}/head" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.get-pr.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ github.event_name == 'pull_request' && 'npm' || '' }}

      - run: npm ci

      - run: npm run typecheck

      - name: Set PR build version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_VERSION="${VERSION}-pr${PR_NUMBER}-$(date +%Y%m%d%H%M%S)"
          npm version "$PR_VERSION" --no-git-tag-version --allow-same-version

      - run: npx electron-vite build

      # Build as zip so artifacts have no bundled auto-updater / installer,
      # mirroring nightly builds. `--publish never` avoids electron-builder
      # resolving a null publisher.
      - run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract zip for single-layer artifact
        shell: bash
        run: |
          mkdir -p dist/extracted
          for f in dist/*.zip; do unzip -q "$f" -d dist/extracted/; done

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.run_number }}-build-${{ matrix.platform }}
          path: dist/extracted/
          if-no-files-found: ignore
          retention-days: 3

  comment-artifacts:
    needs: build
    runs-on: ubuntu-latest
    # Run for non-draft PRs or when triggered by a /build comment
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/build'))
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          header: pr-artifacts
          recreate: true
          message: |
            ### 📦 PR Build Artifacts are ready!
            Portable zip builds (no installer, auto-updater disabled) — unzip and run.

            * 🍎 [macOS Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.run_number }}-build-mac.zip)
            * 🪟 [Windows Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.run_number }}-build-win.zip)
            * 🐧 [Linux Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.run_number }}-build-linux.zip)
