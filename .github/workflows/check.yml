name: Check Build

on:
  pull_request:
    branches:
      - main
  issue_comment:
    types: [created]

jobs:
  build:
    if: >
      github.event_name == 'pull_request' || 
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/build'))
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux zip
          - os: windows-latest
            platform: win
            args: --win zip
          - os: macos-latest
            platform: mac
            args: --mac zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Get PR branch
        if: github.event_name == 'issue_comment'
        id: get-pr
        shell: bash
        run: echo "ref=refs/pull/${{ github.event.issue.number }}/head" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.get-pr.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ github.event_name == 'pull_request' && 'npm' || '' }}

      - run: npm ci

      - run: npm run typecheck

      - name: Set PR build version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_VERSION="${VERSION}-pr${PR_NUMBER}-$(date +%Y%m%d%H%M%S)"
          npm version "$PR_VERSION" --no-git-tag-version --allow-same-version

      - run: npx electron-vite build

      # Build as zip so artifacts have no bundled auto-updater / installer,
      # mirroring nightly builds. `--publish never` avoids electron-builder
      # resolving a null publisher.
      - run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ matrix.platform }}
          path: |
            dist/*.zip
          if-no-files-found: ignore
          retention-days: 3

  comment-artifacts:
    needs: build
    runs-on: ubuntu-latest
    # Run for non-draft PRs or when triggered by a /build comment
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/build'))
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ github.event.issue.number || github.event.pull_request.number }}
          header: pr-artifacts
          recreate: true
          message: |
            ### 📦 PR Build Artifacts are ready!
            Portable zip builds (no installer, auto-updater disabled) — unzip and run.

            * 🍎 [macOS Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-build-mac.zip)
            * 🪟 [Windows Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-build-win.zip)
            * 🐧 [Linux Build](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/pr-build-linux.zip)
